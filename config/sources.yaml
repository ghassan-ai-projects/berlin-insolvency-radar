sources:
  legacy_insolvency_scout:
    kind: legacy_duckdb
    name: "Legacy Insolvency Scout"
    enabled: false
    trust_level: "C"
    mode: read_only
    path: "/Users/ghassan/my-projects/insolvency-scout/data/insolvency_scout.duckdb"

  official_insolvency_berlin:
    kind: official_jsf
    name: "Official Insolvency Portal Berlin"
    enabled: true
    trust_level: "A"
    params:
      base_url: "https://neu.insolvenzbekanntmachungen.de/ap/suche.jsf"
      bundesland: "Berlin"
      date_window_days: 1
      backfill_days_on_first_run: 14

enrichment:
  enabled: true
  timeout_seconds: 10
  delay_between_sources: 0.3
  sources:
    bundesanzeiger:
      enabled: true
    github:
      enabled: true
    website:
      enabled: true
    handelsregister:
      enabled: true
      timeout_seconds: 5
    north_data:
      enabled: true
    wikidata:
      enabled: true
    unternehmensregister:
      enabled: false
      params:
        integration_status: "research_validated_pending_runtime_adapter"
    opencorporates:
      enabled: false
      params:
        integration_status: "research_validated_pending_api_adapter"
